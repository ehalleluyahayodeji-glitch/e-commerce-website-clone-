<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASHION | SIGNUP</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="Signup.css ">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <div class="blur-circle big"></div>
            <div class="blur-circle small"></div>
            <h2><img src="IMAGE/logo.png" alt="" width="200px"></h2>
        </div>
        <div class="form-section">
            <div class="logo">
                <a href="#"><img src="IMAGE/logo.png" alt=""></a>
                <!-- <i class="fa-solid fa-link"></i> -->
            </div>
            <h1>Create Account</h1>
            <p>Enter to get access to a world of creativity with Cara</p>
            <div class="form">
                <div class="name-row">
                    <div class="input-box">
                        <label>First Name</label>
                        <input type="text" placeholder="First name" id="fName">
                    </div>
    
                    <div class="input-box">
                        <label>Last Name</label>
                        <input type="text" placeholder="Last name" id="lName">
                    </div>
                </div>
                <div class="input-box">
                    <label>Email</label>
                    <input type="email" placeholder="Email Address" id="mail">
                </div>
                <div class="input-box password-box">
                    <label>Password</label>
    
                    <div class="password-input">
                        <input type="password" placeholder="Password" id="password">
                        <i class="fa-regular fa-eye"></i>
                    </div>
                </div>
                <button id="createAccount" type="submit">Create Account</button>
            </div>
            <div class="signin">
                Already have an account?
                <a href="Login.html">Login</a>
            </div>
            <div class="divider">
                <span></span>
                <p>OR</p>
                <span></span>
            </div>
            <div class="social-icons">
                <button><i class="fa-brands fa-google"></i></button>
                <button><i class="fa-brands fa-apple"></i></button>
                <button><i class="fa-brands fa-facebook-f"></i></button>
                <button><i class="fa-brands fa-twitter"></i></button>
            </div>
        </div>
    </div>

</body>
<script>
    const eyeIcon = document.querySelector(".password-input i");
const passwordInput = document.querySelector(".password-input input");

eyeIcon.addEventListener("click", () => {
    if(passwordInput.type === "password"){
        passwordInput.type = "text";
        eyeIcon.classList.replace("fa-eye","fa-eye-slash");
    }else{
        passwordInput.type = "password";
        eyeIcon.classList.replace("fa-eye-slash","fa-eye");
    }
});


// SIGNUP LOCAL STORAGE
const userDetails = JSON.parse(localStorage.getItem('keyDetails')) || []
const signUp = document.getElementById('createAccount')
signUp.addEventListener('click', () => {
    const f_name = document.getElementById('fName').value
    const l_name = document.getElementById('lName').value
    const email = document.getElementById('mail').value
    const password = document.getElementById('password').value

    if(f_name.trim() === "" && l_name.trim() === "" && email.trim() === "" && password.trim() === ""){
        Toastify({
            text: "Please Kindly fill all input",
            className: "info",
            style: {
                background: "linear-gradient(to right, black, red)",
}
}).showToast();
    } else{
        const savedUser = {f_name, l_name, email, password}
        userDetails.push(savedUser)
        console.log(userDetails)
        localStorage.setItem('keyDetails', JSON.stringify(userDetails))

        Toastify({
            text: "Sign Up Successful!",
            className: "info",
            style: {
                background: "linear-gradient(to right, #00b09b, #96c93d)",
            }
        }).showToast();

        setTimeout(() => {
            window.location.href = 'Login.html'
        }, 3000);
    }

})
</script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</html>

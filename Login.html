<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASHION | LOGIN</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="Login.css">
</head>
<body>

<div class="container">
    <div class="image-section">
        <div class="blur-circle big"></div>
        <div class="blur-circle small"></div>
        <h2><img src="IMAGE/logo.png" alt="" width="200px"></h2>    </div>
    <div class="form-section">
        <div class="logo">
             <a href="#"><img src="IMAGE/logo.png" alt=""></a>
            <!-- <i class="fa-solid fa-link"></i> -->
        </div>
        <h1>Welcome Back</h1>
        <p>Login to continue your creative journey with Cara</p>
        <div class="form">
            <div class="input-box">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" id="email">
            </div>
            <div class="input-box">
                <label>Password</label>

                <div class="password-field">
                    <input type="password" placeholder="Enter password" id="password">
                    <i class="fa-regular fa-eye"></i>
                </div>
            </div>
            <div class="options">
                <label>
                    <input type="checkbox">
                    Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>
            <button id="loginAccount" type="submit">Login</button>
        </div>
        <div class="signup-link">
            Don't have an account?
            <a href="Signup.html">Create Account</a>
        </div>
        <div class="divider">
            <span></span>
            <p>OR</p>
            <span></span>
        </div>
        <div class="social-icons">
            <button><i class="fa-brands fa-google"></i></button>
            <button><i class="fa-brands fa-apple"></i></button>
            <button><i class="fa-brands fa-facebook-f"></i></button>
            <button><i class="fa-brands fa-github"></i></button>
        </div>
    </div>
</div>
</body>
<script src="script.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</html>
